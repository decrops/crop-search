services:
  postgres:
    image: postgres:16-alpine
    container_name: crop-search-postgres
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cropsearch
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cropsearch"]
      interval: 5s
      timeout: 5s
      retries: 12
